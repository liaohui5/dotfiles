#  ╭──────────────────────────────────────────────────────────────────────────────╮
#  │ lazygit 配置                                                                 │
#  │ https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md          │
#  ╰──────────────────────────────────────────────────────────────────────────────╯
gui:
  language: 'en'
  showIcons: true       # 显示图标需要 Nerd Font
  showListFooter: false # 不显示页脚
  showRandomTip: false  # 不随机显示提示

git:
  autoFetch: true       # 自动拉取远程代码
  autoRefresh: true     # 自动刷新
  mouseevents: false    # 禁用鼠标
  parseEmoji: true      # 解析 gitmoji 表情
  paging:
    colorArg: always
    pager: delta --dark --paging=never --24-bit-color=never --syntax-theme="OneHalfDark"

os:
  editCommand: 'nvim'   # 编辑文件命令
  editCommandTemplate: 'nvim +{{line}} -- {{filename}}'

update:
  method: prompt # 询问是否要更新
  days: 7        # 每7天检查一次是否有更新

reporting: "off" # 不提供日志报告

# 快捷键绑定
keybinding:
  universal:
    quit: '<c-q>' # 退出
    edit: 'o'     # 编辑
