#############################################################################
# docs: https://github.com/alacritty/alacritty/blob/master/alacritty.yml 
# themes: https://www.npmjs.com/package/alacritty-themes
#############################################################################

# 设置窗口
window:
  decorations: "buttonless" # full | buttonless, 设置为 buttonless 就不显示标题栏
  padding:
    x: 2
    y: 2

# 修改配置文件后立即生效
live_config_reload: true

# 如果为true，则使用亮色变体绘制粗体文本。
draw_bold_text_with_bright_colors: false

# 设置字体
font:
  normal:
    family: "Hack Nerd Font Mono"
    style: Regular
  bold:
    family: "Hack Nerd Font Mono"
    #style: Bold
    style: Regular
  italic:
    family: "Hack Nerd Font Mono"
    style: Italic
  bold_italic:
    family: "Hack Nerd Font Mono"
    style: Italic
    #style: Bold Italic

  # 字大小
  size: 16.0

  # y: 文字行高 x: 文字间距
  offset:
    x: 0
    y: 2

# 光标样式
cursor:
  blinking: Off
  unfocused_hollow: true

# 选中
# selection:
#   semantic_escape_chars: ',│`|:"'' ()[]{}<>'
#   save_to_clipboard: true
# 按键绑定
key_bindings:
  - { key: V, mods: command, action: Paste }
  # command + v
  - { key: C, mods: command, action: Copy }
  # command + c
  - { key: T, mods: Alt, chars: "\et" }
  # alt + t
  - { key: H, mods: Alt, chars: "\eh" }
  # alt + h
  - { key: J, mods: Alt, chars: "\ej" }
  # alt + j
  - { key: K, mods: Alt, chars: "\ek" }
  # alt + k
  - { key: L, mods: Alt, chars: "\el" }
  # alt + l
  - { key: I, mods: Alt, chars: "\ei" }
  # alt + i
  - { key: N, mods: Alt, chars: "\en" }
  # alt + n

# 颜色主题 #23241f
theme: Monokai-Sublime
colors:
  name: Monokai-Sublime
  primary:
    background: "#23241f"
    foreground: "#f8f8f2"
  cursor:
    text: "#f5f5f5"
    cursor: "#4f7beb"
  normal:
    black: "#272822"
    red: "#f92672"
    green: "#a6e22e"
    yellow: "#f4bf75"
    blue: "#66d9ef"
    magenta: "#ae81ff"
    cyan: "#a1efe4"
    white: "#f0f0f0"
  bright:
    black: "#75715e"
    red: "#f92672"
    green: "#a6e22e"
    yellow: "#f4bf75"
    blue: "#66d9ef"
    magenta: "#ae81ff"
    cyan: "#a1efe4"
    white: "#f9f8f5"
