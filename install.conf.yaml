- defaults:
    link:
      create: true
      relink: true

- clean: ["~", "~/.config"]

- link:
    ~/.config/alacritty: alacritty
    ~/.config/nvim: nvim
    ~/.config/kitty: kitty
    ~/.config/ranger: ranger
    ~/.config/vifm: vifm
    ~/.config/zellij: zellij
    ~/.gitconfig: .gitconfig
    ~/.zprofile: .zprofile
    ~/.zshrc: .zshrc
    ~/.oh-my-zsh/custom/themes/gtarrow.zsh-theme: gtarrow.zsh-theme
    ~/.bashrc: .bashrc
    ~/.shell-scripts: .shell-scripts
    ~/.tmux.conf: .tmux/.tmux.conf
    ~/.tmux.conf.local: .tmux/.tmux.conf.local
    ~/Library/Application Support/Code/User/settings.json: vscode/settings.json
    ~/Library/Application Support/Code/User/keybindings.json: vscode/keybindings.json
    ~/Library/Application Support/Code/User/snippets: nvim/custom-snippets
    ~/Library/Application Support/Code/User/custom-vscode-assets: vscode/custom-vscode-assets
    ~/Library/Application Support/lazygit/config.yml: lazygit/config.yml

- create:

- shell:
    - [git submodule update --init --recursive, Installing submodules]

